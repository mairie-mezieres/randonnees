<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Randonnées · Mézières-lez-Cléry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --forest:#1e3a1e; --moss:#3d6b3d; --sage:#6b9e5e; --light:#a8c89a;
  --cream:#f5f0e8;  --parch:#ede8dc; --gold:#c9a84c;
  --route:#3b82f6;  --terre:#16a34a; --afr:#ea580c;
  --parcours:#7c3aed;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Source Sans 3',sans-serif;background:var(--forest);overflow:hidden}
.wrap{display:flex;flex-direction:column;height:100dvh}

/* ── HEADER ── */
.hd{background:var(--forest);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(168,200,154,.2);flex-shrink:0}
.hs{font-size:.6rem;color:var(--sage);text-transform:uppercase;letter-spacing:.07em}
.ht{font-family:'Playfair Display',serif;font-size:clamp(.82rem,2vw,1.05rem);color:var(--cream)}
.ht em{color:var(--light);font-style:italic}
.hr{text-align:right;font-size:.68rem;color:var(--light)}

/* ── BODY ── */
.body{display:flex;flex:1;overflow:hidden;position:relative}

/* ── SIDEBAR ── */
.side{width:280px;flex-shrink:0;background:var(--parch);display:flex;flex-direction:column;transition:width .25s,opacity .25s;overflow:hidden;position:relative}
.side.hidden{width:0;opacity:0;pointer-events:none}

/* Bouton toggle — colle sur le bord droit de la sidebar, toujours visible */
.side-tog{
  position:absolute;right:-20px;top:50%;transform:translateY(-50%);
  z-index:500;background:var(--forest);
  border:1px solid rgba(168,200,154,.3);border-left:none;
  border-radius:0 8px 8px 0;color:var(--light);
  width:20px;height:48px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;box-shadow:2px 0 6px rgba(0,0,0,.3);
  transition:right .25s
}
.side.hidden .side-tog{right:-20px}
.side-tog:hover{background:var(--moss)}

/* ── ONGLETS ── */
.tabs{display:flex;background:var(--forest);flex-shrink:0}
.tab{flex:1;padding:9px 4px;background:none;border:none;color:var(--sage);font-size:.63rem;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;overflow:hidden}
.tab.on{color:var(--light);border-bottom-color:var(--gold)}
.tc{display:none;flex:1;overflow-y:auto;flex-direction:column}
.tc.on{display:flex}
.tc::-webkit-scrollbar{width:3px}
.tc::-webkit-scrollbar-thumb{background:rgba(61,107,61,.3);border-radius:2px}

/* ── CIRCUITS ── */
.notice{background:rgba(30,58,30,.07);padding:6px 12px;font-size:.67rem;color:var(--moss);border-bottom:1px solid rgba(0,0,0,.07);line-height:1.4}
.showall{margin:8px 10px;padding:7px 12px;background:var(--forest);color:var(--cream);border:none;border-radius:6px;font-size:.72rem;cursor:pointer;text-align:center}
.showall:hover{background:var(--moss)}
.card{padding:10px 12px 10px 16px;border-bottom:1px solid rgba(0,0,0,.07);cursor:pointer;position:relative;display:flex;align-items:center;gap:10px;transition:background .15s}
.card:hover{background:rgba(61,107,61,.08)}
.card.on{background:rgba(61,107,61,.14)}
.cbar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:0 2px 2px 0}
.cinfo{flex:1;min-width:0}
.cn{font-size:.79rem;font-weight:600;color:var(--forest);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmeta{font-size:.67rem;color:var(--moss);margin-top:1px}
.cbadge{font-size:.6rem;padding:2px 6px;border-radius:10px;font-weight:600;flex-shrink:0}
.detail{background:white;border-bottom:1px solid rgba(0,0,0,.1);padding:12px 14px;display:none}
.detail.on{display:block}
.dtitle{font-family:'Playfair Display',serif;font-size:.88rem;color:var(--forest);margin-bottom:6px}
.dstats{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.ds{background:var(--parch);padding:3px 8px;border-radius:7px;font-size:.68rem;color:var(--forest);font-weight:600}
.dbtns{display:flex;gap:5px;flex-wrap:wrap}
.dbtn{padding:5px 9px;border:none;border-radius:6px;font-size:.67rem;cursor:pointer;font-family:inherit;font-weight:600}
.dbtn.prim{color:white}
.dbtn.sec{background:var(--parch);color:var(--forest)}

/* ── RÉSEAU ── */
.net-wrap{padding:10px;display:flex;flex-direction:column;gap:9px}
.sec-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--moss);font-weight:700}
.net-st{font-size:.7rem;padding:7px 10px;border-radius:7px;display:flex;align-items:center;gap:7px;background:rgba(0,0,0,.06);color:var(--moss)}
.net-st.ok{background:rgba(22,163,74,.08);color:#15803d}
.net-st.err{background:rgba(234,88,12,.08);color:#b54300;line-height:1.5}
.lyr-card{display:flex;align-items:center;gap:9px;background:white;border:1px solid rgba(0,0,0,.1);border-radius:9px;padding:9px 11px;cursor:pointer;transition:all .2s;user-select:none}
.lyr-card:hover{background:var(--parch)}
.lyr-card.off{opacity:.35}
.lyr-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lyr-name{font-size:.78rem;font-weight:600;color:var(--forest)}
.lyr-desc{font-size:.64rem;color:var(--moss);margin-top:1px}
.lyr-sw{width:30px;height:17px;background:rgba(0,0,0,.15);border-radius:9px;position:relative;transition:background .2s;flex-shrink:0;margin-left:auto}
.lyr-sw::after{content:'';position:absolute;top:2px;left:2px;width:13px;height:13px;background:#fff;border-radius:50%;transition:transform .2s}
.lyr-card:not(.off) .lyr-sw{background:var(--gold)}
.lyr-card:not(.off) .lyr-sw::after{transform:translateX(13px)}
.afr-note{background:rgba(234,88,12,.07);border:1px solid rgba(234,88,12,.2);border-radius:8px;padding:8px 10px;font-size:.68rem;color:#b54300;line-height:1.5}

/* ── GÉNÉRATEUR ── */
.gen-card{background:white;border:1px solid rgba(0,0,0,.1);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px}
.gen-hdr{display:flex;align-items:center;gap:7px}
.gen-badge{background:var(--forest);color:var(--gold);font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:2px 7px;border-radius:20px}
.gen-title{font-size:.8rem;font-weight:700;color:var(--forest)}
.gen-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.07em;color:var(--moss);margin-bottom:3px}
.gen-sel{width:100%;background:var(--parch);border:1px solid rgba(0,0,0,.12);border-radius:6px;color:var(--forest);padding:6px 8px;font-family:inherit;font-size:.76rem;outline:none}
.gen-modes{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.gen-mode{background:var(--parch);border:1px solid rgba(0,0,0,.1);border-radius:6px;padding:5px 2px;text-align:center;font-size:.66rem;color:var(--moss);cursor:pointer;transition:all .15s}
.gen-mode .em{display:block;font-size:.95rem;margin-bottom:1px}
.gen-mode.sel{background:rgba(30,58,30,.1);border-color:var(--forest);color:var(--forest);font-weight:700}
.dep-btns{display:flex;gap:5px;margin-top:3px}
.dep-btn{flex:1;background:var(--parch);border:1px solid rgba(0,0,0,.1);border-radius:6px;color:var(--moss);font-family:inherit;font-size:.68rem;font-weight:600;padding:6px 2px;cursor:pointer;text-align:center;transition:all .15s}
.dep-btn.active{background:rgba(30,58,30,.1);border-color:var(--forest);color:var(--forest)}
.dep-info{font-size:.67rem;color:var(--moss);margin-top:3px;min-height:1em}
.gen-btn{width:100%;background:var(--forest);border:none;border-radius:8px;color:var(--cream);font-family:'Playfair Display',serif;font-size:.85rem;padding:9px;cursor:pointer;transition:background .2s}
.gen-btn:hover{background:var(--moss)}
.gen-btn:disabled{opacity:.4;cursor:not-allowed}
.gen-result{display:none;background:var(--parch);border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px;font-size:.73rem;color:var(--forest)}
.gen-result.show{display:block}
.gen-rtitle{font-family:'Playfair Display',serif;font-size:.85rem;color:var(--forest);margin-bottom:4px}
.gen-rbody{color:#444;line-height:1.55;margin-bottom:7px;font-size:.72rem}
.gen-rbtns{display:flex;gap:5px}
.gen-rbtn{flex:1;border:none;border-radius:5px;font-family:inherit;font-size:.67rem;font-weight:600;padding:6px;cursor:pointer}
.gen-rbtn.dl{background:rgba(30,58,30,.12);color:var(--forest)}
.gen-rbtn.gps{background:rgba(22,163,74,.12);color:#15803d}
.gen-rbtn.clr{background:rgba(0,0,0,.07);color:#555}

/* ── INFOS ── */
.ib{padding:10px 12px;border-bottom:1px solid rgba(0,0,0,.07)}
.ib h3{font-family:'Playfair Display',serif;font-size:.8rem;color:var(--forest);margin-bottom:4px}
.ib p{font-size:.71rem;color:#555;line-height:1.5}
.hl{background:var(--forest);color:var(--cream);border-radius:6px;padding:6px 10px;font-size:.7rem;margin-top:5px;line-height:1.6}

/* ── MAP ── */
.map-wrap{flex:1;position:relative;overflow:hidden}
#map{position:absolute;inset:0}

/* Toggles flottants */
.map-togs{position:absolute;top:10px;right:10px;z-index:400;display:none;flex-direction:column;gap:4px}
.mt-btn{background:rgba(30,58,30,.88);backdrop-filter:blur(3px);border:1px solid rgba(168,200,154,.25);border-radius:7px;color:var(--cream);font-family:inherit;font-size:.68rem;font-weight:700;padding:5px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;box-shadow:0 2px 7px rgba(0,0,0,.3);white-space:nowrap}
.mt-btn .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mt-btn.off{opacity:.4}

/* GPS FAB */
.gpsfab{position:absolute;left:14px;bottom:16px;z-index:400;background:rgba(30,58,30,.88);backdrop-filter:blur(3px);border:1px solid rgba(168,200,154,.3);border-radius:24px;color:var(--cream);font-family:inherit;font-size:.78rem;font-weight:700;padding:9px 14px;display:flex;align-items:center;gap:7px;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.3)}
.gpsfab.on{border-color:var(--sage);color:var(--light)}

/* Légende */
.leg{background:rgba(245,240,232,.93);border-radius:7px;padding:8px 10px;font-size:.67rem;box-shadow:0 2px 8px rgba(0,0,0,.15);max-height:180px;overflow-y:auto}
.leg h4{font-family:'Playfair Display',serif;font-size:.72rem;color:var(--forest);margin-bottom:4px}
.li{display:flex;align-items:center;gap:5px;margin-bottom:2px;cursor:pointer;color:#333}
.li.on{font-weight:700;color:var(--forest)}
.ll{width:16px;height:3px;border-radius:2px;flex-shrink:0}

/* Hint départ */
.dep-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:400;background:rgba(30,58,30,.92);border:1px solid var(--gold);border-radius:10px;color:var(--gold);font-size:.8rem;font-weight:700;padding:10px 18px;pointer-events:none;display:none}

/* ── DRAWER MOBILE ── */
.mob-fab{display:none;position:fixed;bottom:16px;right:16px;z-index:600;background:var(--forest);color:var(--cream);border:1px solid rgba(168,200,154,.3);border-radius:24px;padding:10px 18px;font-size:.8rem;font-weight:700;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.35);align-items:center;gap:8px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:700}
.mob-overlay.open{display:block}
.mob-drawer{display:none;position:fixed;bottom:0;left:0;right:0;max-height:80dvh;background:var(--parch);border-radius:16px 16px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.3);z-index:800;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.mob-drawer.open{display:flex;transform:translateY(0)}
.mob-handle{width:38px;height:4px;background:rgba(0,0,0,.18);border-radius:2px;margin:12px auto 8px;flex-shrink:0}
.mob-tabs{display:flex;background:var(--forest);flex-shrink:0}
.mob-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── ANIMATIONS ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.blink{animation:pulse 1.5s 3}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
.ldots::after{content:'';animation:ld 1.2s infinite}
@keyframes ld{0%{content:'.'}33%{content:'..'}66%{content:'...'}}

/* Leaflet */
.chem-tt{background:var(--forest)!important;border:1px solid rgba(201,168,76,.3)!important;color:var(--cream)!important;font-size:.7rem!important;padding:3px 7px!important;border-radius:5px!important;font-family:inherit!important}
.leaflet-tooltip.chem-tt::before{display:none!important}
.leaflet-popup-content-wrapper{background:var(--cream);border-radius:8px}
.pt{font-family:'Playfair Display',serif;font-size:.9rem;color:var(--forest);margin-bottom:3px}
.pb{font-size:.72rem;color:#555;line-height:1.5}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .side{display:none!important}     /* Remplacé par le drawer */
  .mob-fab{display:flex}
  .side-tog{display:none}
  .map-togs{top:auto;bottom:76px;right:10px}
  .leg{display:none}
}
</style>
</head>
<body>
<div class="wrap">

<!-- HEADER -->
<div class="hd">
  <div><div class="hs">Commune de</div><div class="ht">Mézières-lez-Cléry <em>— À l'orée de la Sologne</em></div></div>
  <div class="hr"><div class="hs" style="text-align:right">Randonnées pédestres</div>14 circuits · 3 à 22 km</div>
</div>

<div class="body">

  <!-- ═══ SIDEBAR DESKTOP ═══ -->
  <div class="side" id="side">
    <button class="side-tog" id="side-tog" onclick="toggleSide()">‹</button>
    <div class="tabs" id="desk-tabs">
      <button class="tab on" onclick="doTab('reseau',this,'desk')">🗺️ Réseau</button>
      <button class="tab"    onclick="doTab('circuits',this,'desk')">🥾 Circuits</button>
      <button class="tab"    onclick="doTab('infos',this,'desk')">ℹ️ Infos</button>
    </div>
    <div class="tc on" id="tc-reseau"><!-- contenu réseau injecté --></div>
    <div class="tc"    id="tc-circuits"><!-- contenu circuits injecté --></div>
    <div class="tc"    id="tc-infos"><!-- contenu infos injecté --></div>
  </div>

  <!-- ═══ MAP ═══ -->
  <div class="map-wrap">
    <div id="map"></div>
    <div class="dep-hint" id="dep-hint">Cliquez sur la carte pour choisir le départ</div>

    <!-- Toggles flottants réseau -->
    <div class="map-togs" id="map-togs">
      <button class="mt-btn" id="mt-route" onclick="toggleLayer('route')"><span class="dot" style="background:#60a5fa"></span>Routes</button>
      <button class="mt-btn" id="mt-terre" onclick="toggleLayer('terre')"><span class="dot" style="background:#4ade80"></span>Chemins</button>
      <button class="mt-btn" id="mt-afr"   onclick="toggleLayer('afr')">  <span class="dot" style="background:#fb923c"></span>AFR</button>
    </div>

    <button class="gpsfab blink" id="gpsfab" onclick="toggleGps()">
      <span>📍</span><span>Localisez-moi</span>
    </button>
  </div>
</div><!-- /body -->
</div><!-- /wrap -->

<!-- ═══ DRAWER MOBILE ═══ -->
<button class="mob-fab" id="mob-fab" onclick="openDrawer()">📋 Menu</button>
<div class="mob-overlay" id="mob-overlay" onclick="closeDrawer()"></div>
<div class="mob-drawer" id="mob-drawer">
  <div class="mob-handle"></div>
  <div class="mob-tabs" id="mob-tabs">
    <button class="tab on" onclick="doTab('reseau',this,'mob')">🗺️ Réseau</button>
    <button class="tab"    onclick="doTab('circuits',this,'mob')">🥾 Circuits</button>
    <button class="tab"    onclick="doTab('infos',this,'mob')">ℹ️ Infos</button>
  </div>
  <div class="mob-scroll" id="mob-scroll"><!-- contenu injecté dynamiquement --></div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// VARIABLES GLOBALES — toutes déclarées ici, avant tout usage
// ══════════════════════════════════════════════════════════

let sideOpen      = true;

// ══════════════════════════════════════════════════════════

  {id:2, name:"Semi-Marathon Mézières/Donjon — 21.5 km", km:21.5, duree:"5h22", color:"#3498db",

const netGroups  = {route:L.layerGroup(), terre:L.layerGroup(), afr:L.layerGroup()};

  route: {color:'#60a5fa', weight:5, opacity:.85},

async function loadReseau(isRetry=false) {
  const setSt = (cls,html) => {
    document.querySelectorAll('#net-status').forEach(el=>{el.className='net-st '+cls;el.innerHTML=html;});
  };
  const setCards = (show) => {
    document.querySelectorAll('#lyr-cards').forEach(el=>{el.style.display=show?'flex':'none';});
  };
  setSt('',`<span class="spin"></span> ${isRetry?'Nouvelle tentative…':'Chargement des voies…'}`);
  try {
    const [rR,tR,aR] = await Promise.all([
      fetch('./data/routes.geojson'),
      fetch('./data/terres.geojson'),
      fetch('./data/afr.geojson')
    ]);
    if (!rR.ok||!tR.ok||!aR.ok) throw new Error(`HTTP ${[rR.status,tR.status,aR.status].join('/')}`);
    const [routes,terres,afr] = await Promise.all([rR.json(),tR.json(),aR.json()]);

    Object.values(netGroups).forEach(g=>g.clearLayers());
    geoData={route:[],terre:[],afr:[]};
    let total=0;

    const addGeo=(gj,type)=>{
      (gj.features||[]).forEach(f=>{
        const geom=f.geometry; if(!geom) return;
        const name=f.properties?.name||f.properties?.nom||null;
        const addLine=coords=>{
          if(coords.length<2) return;
          const pl=L.polyline(coords,{...netStyles[type]});
          if(name) pl.bindTooltip(name,{sticky:true,className:'chem-tt'});
          netGroups[type].addLayer(pl);
          geoData[type].push(coords);
          total++;
        };
        if(geom.type==='LineString') addLine(geom.coordinates.map(c=>[c[1],c[0]]));
        else if(geom.type==='MultiLineString') geom.coordinates.forEach(l=>addLine(l.map(c=>[c[1],c[0]])));
      });
    };
    addGeo(routes,'route'); addGeo(terres,'terre'); addGeo(afr,'afr');

    // Afficher sur la carte si onglet réseau actif
    if (currentTab==='reseau') {
      Object.entries(netGroups).forEach(([k,g])=>{if(netVisible[k])g.addTo(map);});
    }
    netReady=true;
    setSt('ok',`✓ ${total} tronçons chargés`);
    setCards(true);
  } catch(e) {
    setSt('err',`⚠️ Échec chargement (${e.message})<br>
      <button onclick="loadReseau(true)" style="margin-top:5px;background:rgba(234,88,12,.12);border:1px solid rgba(234,88,12,.3);border-radius:5px;color:#b54300;font-size:.68rem;font-weight:700;padding:3px 9px;cursor:pointer;font-family:inherit">↻ Réessayer</button>`);
    setCards(true);
    netReady=false;
    if(!isRetry) setTimeout(()=>loadReseau(true), 3000);
  }
}

// ROUTAGE SUR GRAPHE RÉEL
// Distance entre deux points [lat,lng] en mètres (Haversine)
// ══════════════════════════════════════════════════════════
function dist(a,b){
  const R=6371000,dLat=(b[0]-a[0])*Math.PI/180,dLng=(b[1]-a[1])*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// Snap : trouver le point le plus proche sur les segments
function snapToNet(segs, pt) {
  let best=null,bestD=Infinity,bestSeg=-1,bestIdx=-1;
  segs.forEach((seg,si)=>seg.forEach((p,pi)=>{
    const d=dist(pt,p);
    if(d<bestD){bestD=d;best=p;bestSeg=si;bestIdx=pi;}
  }));
  return {point:best,segIdx:bestSeg,ptIdx:bestIdx,d:bestD};
}

// Construire une boucle en suivant les segments GeoJSON réels
// On parcourt les segments en cherchant des connexions (extrémités proches)
function buildGraphLoop(targetM, mode) {
  // Sélection des couches selon mode
  let segs=[];
  if(mode==='cheval') segs=[...geoData.terre];
  else if(mode==='velo') segs=[...geoData.route,...geoData.terre];
  else segs=[...geoData.terre,...geoData.route]; // pied : chemins en priorité + routes ok

  if(!segs.length) return null;

  // Snap du point de départ
  const snap=snapToNet(segs,departCoords);
  if(!snap.point) return null;

  // Construire un graphe simplifié : noeuds = extrémités de chaque segment
  // On considère que deux extrémités sont connectées si distance < 30m
  const CONNECT_DIST = 30; // mètres

  // Index des extrémités : pour chaque segment, début et fin
  const nodes=[]; // {pt, segIdx, end:0|1}
  segs.forEach((seg,si)=>{
    nodes.push({pt:seg[0],         segIdx:si,end:0});
    nodes.push({pt:seg[seg.length-1],segIdx:si,end:1});
  });

  // Trouver les voisins d'un nœud (segments connectés)
  function neighbors(segIdx, entryEnd) {
    const entryPt = entryEnd===0 ? segs[segIdx][0] : segs[segIdx][segs[segIdx].length-1];
    const exitPt  = entryEnd===0 ? segs[segIdx][segs[segIdx].length-1] : segs[segIdx][0];
    // Chercher les segments dont une extrémité est proche de exitPt
    const result=[];
    nodes.forEach(n=>{
      if(n.segIdx===segIdx) return; // même segment
      if(dist(n.pt,exitPt)<CONNECT_DIST) result.push({segIdx:n.segIdx, entryEnd:n.end});
    });
    return result;
  }

  // Calculer la longueur d'un segment
  function segLen(si) {
    const seg=segs[si]; let l=0;
    for(let i=1;i<seg.length;i++) l+=dist(seg[i-1],seg[i]);
    return l;
  }

  // Longueurs précalculées
  const segLens=segs.map((_,i)=>segLen(i));

  // Parcours : on cherche une boucle d'environ targetM mètres
  // Algorithme : DFS avec backtracking léger, limite de temps
  const startSnap=snapToNet(segs,departCoords);
  const startSeg=startSnap.segIdx;

  // Trouver le bon end (le plus proche du départ)
  const d0=dist(segs[startSeg][0],departCoords);
  const d1=dist(segs[startSeg][segs[startSeg].length-1],departCoords);
  const startEnd=d0<d1?0:1;

  // Parcours greedy avec randomisation
  const visited=new Set();
  const path=[]; // {segIdx, forward:bool}
  let totalLen=0;
  let cur={segIdx:startSeg, entryEnd:startEnd};

  const MAX_ITERS=200;
  let iters=0;

  // Phase aller : s'éloigner jusqu'à ~55% de la cible
  while(totalLen < targetM*0.55 && iters<MAX_ITERS) {
    iters++;
    const {segIdx,entryEnd}=cur;
    if(visited.has(segIdx)) {
      // Chercher un segment non visité proche
      const exitPt = entryEnd===0 ? segs[segIdx][segs[segIdx].length-1] : segs[segIdx][0];
      const unvisited=nodes.filter(n=>!visited.has(n.segIdx)&&dist(n.pt,exitPt)<100);
      if(!unvisited.length) break;
      cur={segIdx:unvisited[0].segIdx,entryEnd:unvisited[0].end};
      continue;
    }
    const forward = entryEnd===0;
    path.push({segIdx,forward});
    visited.add(segIdx);
    totalLen+=segLens[segIdx];

    const nexts=neighbors(segIdx,entryEnd===0?1:0)
      .filter(n=>!visited.has(n.segIdx));
    if(!nexts.length) break;
    // Choisir le voisin qui s'éloigne le plus du départ
    const exitPt=entryEnd===0?segs[segIdx][segs[segIdx].length-1]:segs[segIdx][0];
    const dFromStart=dist(exitPt,departCoords);
    nexts.sort((a,b)=>{
      const pa=a.entryEnd===0?segs[a.segIdx][0]:segs[a.segIdx][segs[a.segIdx].length-1];
      const pb=b.entryEnd===0?segs[b.segIdx][0]:segs[b.segIdx][segs[b.segIdx].length-1];
      return dist(pb,departCoords)-dist(pa,departCoords);
    });
    // Un peu de randomisation
    const pool=nexts.slice(0,Math.max(1,Math.min(3,nexts.length)));
    cur=pool[Math.floor(Math.random()*pool.length)];
  }

  // Phase retour : revenir vers le départ
  iters=0;
  while(iters<MAX_ITERS) {
    iters++;
    const {segIdx,entryEnd}=cur;
    const exitPt=entryEnd===0?segs[segIdx][segs[segIdx].length-1]:segs[segIdx][0];
    const dFromStart=dist(exitPt,departCoords);
    if(dFromStart<80) break; // on est arrivé

    if(!visited.has(segIdx)){
      path.push({segIdx,forward:entryEnd===0});
      visited.add(segIdx);
      totalLen+=segLens[segIdx];
    }

    const nexts=neighbors(segIdx,entryEnd===0?1:0);
    if(!nexts.length) break;
    // Choisir le voisin le plus proche du départ
    nexts.sort((a,b)=>{
      const pa=a.entryEnd===0?segs[a.segIdx][0]:segs[a.segIdx][segs[a.segIdx].length-1];
      const pb=b.entryEnd===0?segs[b.segIdx][0]:segs[b.segIdx][segs[b.segIdx].length-1];
      return dist(pa,departCoords)-dist(pb,departCoords);
    });
    cur=nexts[0];
  }

  // Construire le tracé réel depuis les segments
  if(!path.length) return null;

  const coords=[departCoords];
  path.forEach(({segIdx,forward})=>{
    const seg=segs[segIdx];
    const pts=forward?seg:[...seg].reverse();
    pts.forEach(p=>coords.push(p));
  });
  coords.push(departCoords);

  // Recalculer la distance réelle
  let realDist=0;
  for(let i=1;i<coords.length;i++) realDist+=dist(coords[i-1],coords[i]);

  return {coords,distM:realDist};
}

function selMode(el) {
  document.querySelectorAll('.gen-mode').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');

function setDepart(mode) {
  departMode=mode;
  ['parking','carte','gps'].forEach(m=>{

  });

    info().forEach(el=>el.textContent='🅿️ Parking des randonneurs');

    pickingDepart=false;
    map.getContainer().style.cursor='';
    if(departMarker){map.removeLayer(departMarker);departMarker=null;}
  } else if(mode==='carte'){
    info().forEach(el=>el.textContent='🖱️ Cliquez sur la carte…');
    if(hint) hint.style.display='block';
    pickingDepart=true;
    map.getContainer().style.cursor='crosshair';
  } else if(mode==='gps'){
    info().forEach(el=>el.textContent='📡 Localisation…');
    pickingDepart=false;
    map.getContainer().style.cursor='';
    if(!navigator.geolocation){info().forEach(el=>el.textContent='⚠️ GPS indisponible');return;}
    navigator.geolocation.getCurrentPosition(pos=>{
      departCoords=[pos.coords.latitude,pos.coords.longitude];
      info().forEach(el=>el.textContent=`📍 ${departCoords[0].toFixed(5)}, ${departCoords[1].toFixed(5)}`);

      departMarker=L.circleMarker(departCoords,{radius:9,color:'#4ade80',weight:3,fillColor:'#4ade80',fillOpacity:.7}).addTo(map);
      map.setView(departCoords,14);
    },()=>{info().forEach(el=>el.textContent='⚠️ GPS indisponible');},{enableHighAccuracy:true,timeout:10000});
  }
}

map.on('click',e=>{
  if(!pickingDepart) return;
  departCoords=[e.latlng.lat,e.latlng.lng];
  if(departMarker) map.removeLayer(departMarker);
  departMarker=L.circleMarker(departCoords,{radius:9,color:'#4ade80',weight:3,fillColor:'#4ade80',fillOpacity:.7}).addTo(map);

  if(hint) hint.style.display='none';

});

function generateRoute() {
  clearRoute(); // Effacer l'ancien parcours

  const btn=document.getElementById('gen-btn');
  const res=document.getElementById('gen-result');
  const rtitle=document.getElementById('gen-rtitle');
  const rbody=document.getElementById('gen-rbody');

  if(!netReady||(geoData.route.length+geoData.terre.length)===0){
    res.classList.add('show');
    rtitle.textContent='Réseau indisponible';
    rbody.innerHTML='Les fichiers GeoJSON ne sont pas chargés.<br>Vérifiez <code>data/routes.geojson</code> et <code>data/terres.geojson</code>';
    return;
  }

  const targetKm=parseFloat(document.getElementById('gen-dist').value);
  const targetM=targetKm*1000;

  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span> Calcul…';
  res.classList.add('show');
  rtitle.textContent='Calcul en cours…';
  rbody.innerHTML='<span class="ldots">Recherche sur le réseau</span>';

  setTimeout(()=>{
    try{
      // Essayer plusieurs fois, garder le mieux
      let best=null;
      for(let i=0;i<6;i++){
        const r=buildGraphLoop(targetM,genMode);
        if(!r) continue;
        if(!best||Math.abs(r.distM-targetM)<Math.abs(best.distM-targetM)) best=r;
      }

      if(!best||best.coords.length<4){
        rtitle.textContent='Impossible de calculer';
        rbody.innerHTML='Pas assez de connexions dans le réseau pour cette distance.';
        return;
      }

      const realKm=(best.distM/1000).toFixed(1);
      const speeds={pied:4,velo:15,cheval:8};
      const dureeMin=Math.round((best.distM/1000)/(speeds[genMode]||4)*60);
      const h=Math.floor(dureeMin/60),m=dureeMin%60;
      const dureeStr=h>0?`${h}h${m.toString().padStart(2,'0')}`:`${m} min`;

      genCoords=best.coords;
      // Couleur foncée et épaisse — bien visible sur le fond de carte
      genLayer=L.polyline(genCoords,{color:'#4c1d95',weight:6,opacity:.95}).addTo(map);
      map.fitBounds(genLayer.getBounds(),{padding:[40,40]});

      // Masquer le réseau une fois le parcours affiché
      Object.values(netGroups).forEach(g=>map.removeLayer(g));
      Object.values(netGroups).forEach((g,i)=>{
        const keys=['route','terre','afr'];
        document.getElementById('mt-'+keys[i])?.classList.add('off');
      });

      rtitle.textContent=`Boucle de ${realKm} km`;
      rbody.innerHTML=`<strong>${{pied:'À pied',velo:'À vélo',cheval:'À cheval'}[genMode]}</strong> · ⏱ ${dureeStr}<br>
        Tracé sur les voies réelles de la commune.${genMode==='pied'?'<br><small style="color:var(--moss)">Quelques tronçons de route peuvent être utilisés pour rejoindre les chemins.</small>':''}`;
      document.getElementById('gen-gps-btn').style.display='';

    }catch(e){
      rtitle.textContent='Erreur';
      rbody.innerHTML=e.message;
    }finally{
      btn.disabled=false;
      btn.innerHTML='⚙ Calculer le parcours';
    }
  },50);
}

function clearRoute() {
  if(genLayer){map.removeLayer(genLayer);genLayer=null;genCoords=null;}
  // Réafficher le réseau si on est sur l'onglet réseau
  if(currentTab==='reseau'){
    Object.entries(netGroups).forEach(([k,g])=>{
      if(netVisible[k]) g.addTo(map);
      document.getElementById('mt-'+k)?.classList.toggle('off',!netVisible[k]);
    });
  }
  // Stopper GPS parcours si actif
  stopGenGps();
  document.getElementById('gen-result')?.classList.remove('show');
}

// GPS live sur le parcours généré
function toggleGenGps() {
  if(genGpsWatch){stopGenGps();return;}
  if(!navigator.geolocation){alert('GPS indisponible');return;}
  const btn=document.getElementById('gen-gps-btn');
  if(btn) btn.textContent='⏹ Arrêter GPS';
  genGpsWatch=navigator.geolocation.watchPosition(pos=>{
    const ll=[pos.coords.latitude,pos.coords.longitude];
    if(!genUserMk) genUserMk=L.circleMarker(ll,{radius:9,color:'#4c1d95',weight:3,fillColor:'#a78bfa',fillOpacity:.9}).addTo(map);
    else genUserMk.setLatLng(ll);
  },()=>{},{enableHighAccuracy:true,maximumAge:3000,timeout:12000});
}
function stopGenGps(){
  if(genGpsWatch){navigator.geolocation.clearWatch(genGpsWatch);genGpsWatch=null;}
  if(genUserMk){map.removeLayer(genUserMk);genUserMk=null;}
  const btn=document.getElementById('gen-gps-btn');
  if(btn) btn.textContent='📍 GPS live';
}

function downloadRouteGPX(){
  if(!genCoords||genCoords.length<2) return;
  const pts=genCoords.map(c=>`<trkpt lat="${c[0]}" lon="${c[1]}"></trkpt>`).join('\n');
  const gpx=`<?xml version="1.0"?><gpx version="1.1" creator="MAT-Mezieres"><trk><n>Parcours généré</n><trkseg>${pts}</trkseg></trk></gpx>`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([gpx],{type:'application/gpx+xml'}));
  a.download='parcours-mezieres.gpx'; a.click();
}

// ══════════════════════════════════════════════════════════
// CIRCUITS
// ══════════════════════════════════════════════════════════
function selectTrack(id){
  if(activeId===id){clearSelection();return;}
  activeId=id;
  TRACKS.forEach(t=>layers[t.id].setStyle(t.id===id?{weight:5,opacity:1}:{weight:2,opacity:.12}));
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('on'));
  document.querySelectorAll('.detail').forEach(d=>d.classList.remove('on'));
  document.getElementById(`card-${id}`)?.classList.add('on');
  document.getElementById(`det-${id}`)?.classList.add('on');
  buildLegend();
  zoomTrack(id);
}
function zoomTrack(id){map.fitBounds(layers[id].getBounds(),{padding:[30,30]});}
function clearSelection(){
  activeId=null;
  TRACKS.forEach(t=>layers[t.id].setStyle({weight:3,opacity:.7}));
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('on'));
  document.querySelectorAll('.detail').forEach(d=>d.classList.remove('on'));
  buildLegend();
}
function showAll(){
  clearSelection();
  map.fitBounds(L.latLngBounds(TRACKS.flatMap(t=>t.coords)),{padding:[30,30]});
}
function buildLegend(el){
  el=el||document.getElementById('legend'); if(!el) return;
  el.innerHTML='<h4>Circuits</h4>'+TRACKS.map(t=>`
    <div class="li ${activeId===t.id?'on':''}" onclick="selectTrack(${t.id})">
      <div class="ll" style="background:${t.color}"></div>${t.km}km
    </div>`).join('');
}
function downloadGPX(id){
  const t=TRACKS.find(x=>x.id===id);if(!t)return;
  const pts=t.coords.map(c=>`<trkpt lat="${c[0]}" lon="${c[1]}"></trkpt>`).join('\n');
  const gpx=`<?xml version="1.0"?><gpx version="1.1" creator="MAT-Mezieres"><trk><n>${t.name}</n><trkseg>${pts}</trkseg></trk></gpx>`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([gpx],{type:'application/gpx+xml'}));
  a.download=(t.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-'))+'.gpx';
  a.click();
}

// ══════════════════════════════════════════════════════════
// GPS GLOBAL (localisation sur la carte)
// ══════════════════════════════════════════════════════════
function toggleGps(){
  const btn=document.getElementById('gpsfab');
  btn.classList.remove('blink');
  if(gpsWatchId){
    navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null;
    if(userMarker){map.removeLayer(userMarker);userMarker=null;}
    if(userAccuracy){map.removeLayer(userAccuracy);userAccuracy=null;}
    btn.classList.remove('on');
    btn.innerHTML='<span>📍</span><span>Localisez-moi</span>';
    return;
  }
  if(!navigator.geolocation){alert('Géolocalisation non supportée');return;}
  btn.innerHTML='<span>📡</span><span>Localisation…</span>';
  gpsWatchId=navigator.geolocation.watchPosition(pos=>{
    const ll=[pos.coords.latitude,pos.coords.longitude],acc=pos.coords.accuracy||0;
    if(!userMarker) userMarker=L.circleMarker(ll,{radius:8,color:'#1e3a1e',weight:3,fillColor:'#c9a84c',fillOpacity:1}).addTo(map);
    else userMarker.setLatLng(ll);
    if(!userAccuracy) userAccuracy=L.circle(ll,{radius:acc,color:'#6b9e5e',weight:1,fillColor:'#a8c89a',fillOpacity:.15}).addTo(map);
    else{userAccuracy.setLatLng(ll);userAccuracy.setRadius(acc);}
    btn.classList.add('on');
    btn.innerHTML='<span>📍</span><span>Localisé ✓</span>';
  },()=>{
    btn.classList.remove('on');
    btn.innerHTML='<span>📍</span><span>Localisez-moi</span>';
  },{enableHighAccuracy:true,maximumAge:5000,timeout:12000});
}
function startTrackGps(id){selectTrack(id);if(!gpsWatchId)toggleGps();}

// ══════════════════════════════════════════════════════════
// TABS — synchronisés desktop + mobile
// doTab(n, btn, ctx) : ctx='desk'|'mob'
// ══════════════════════════════════════════════════════════
function doTab(n, btn, ctx) {
  if(currentTab!==n) clearRoute(); // Effacer le parcours au changement d'onglet
  currentTab=n;

  // Sync onglets desktop
  document.querySelectorAll('#desk-tabs .tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('#mob-tabs .tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  // Activer l'onglet correspondant dans l'autre contexte
  const allTabs=[...document.querySelectorAll('#desk-tabs .tab'),...document.querySelectorAll('#mob-tabs .tab')];
  const labels={reseau:'🗺️ Réseau',circuits:'🥾 Circuits',infos:'ℹ️ Infos'};
  allTabs.forEach(b=>{if(b.textContent.trim()===labels[n]) b.classList.add('on');});

  // Afficher le bon contenu
  document.querySelectorAll('.tc').forEach(t=>t.classList.remove('on'));
  document.getElementById('tc-'+n)?.classList.add('on');

  // Contenu mobile
  const scroll=document.getElementById('mob-scroll');
  if(scroll){
    if(n==='reseau')     scroll.innerHTML=htmlReseau();
    else if(n==='circuits') scroll.innerHTML=htmlCircuits();
    else                 scroll.innerHTML=htmlInfos();
  }

  const togs=document.getElementById('map-togs');
  if(n==='reseau'){
    map.removeLayer(circuitGroup);
    document.getElementById('legend').style.display='none';
    if(togs) togs.style.display='flex';
    if(netReady) Object.entries(netGroups).forEach(([k,g])=>{if(netVisible[k])g.addTo(map);});
    else loadReseau();
  } else {
    circuitGroup.addTo(map);
    document.getElementById('legend').style.display='';
    if(togs) togs.style.display='none';
    Object.values(netGroups).forEach(g=>map.removeLayer(g));
  }
}

// ══════════════════════════════════════════════════════════
// TOGGLE SIDEBAR DESKTOP
// ══════════════════════════════════════════════════════════
function toggleSide(){
  sideOpen=!sideOpen;
  document.getElementById('side').classList.toggle('hidden',!sideOpen);
  document.getElementById('side-tog').textContent=sideOpen?'‹':'›';
  setTimeout(()=>map.invalidateSize(),280);
}

// ══════════════════════════════════════════════════════════
// DRAWER MOBILE
// ══════════════════════════════════════════════════════════
function openDrawer(){
  document.getElementById('mob-overlay').classList.add('open');
  document.getElementById('mob-drawer').classList.add('open');
  // Initialiser le contenu si vide
  const scroll=document.getElementById('mob-scroll');
  if(!scroll.innerHTML.trim()){
    if(currentTab==='reseau')      scroll.innerHTML=htmlReseau();
    else if(currentTab==='circuits') scroll.innerHTML=htmlCircuits();
    else                            scroll.innerHTML=htmlInfos();
  }
}
function closeDrawer(){
  document.getElementById('mob-overlay').classList.remove('open');
  document.getElementById('mob-drawer').classList.remove('open');
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
injectTabContent();
buildLegend();
// Onglet Réseau actif par défaut → masquer circuits
map.removeLayer(circuitGroup);
document.getElementById('legend').style.display='none';
document.getElementById('map-togs').style.display='flex';
loadReseau();
setTimeout(()=>document.getElementById('gpsfab')?.classList.remove('blink'),9000);
</script>
